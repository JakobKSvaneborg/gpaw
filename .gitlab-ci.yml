variables:
  PYTHONUSERBASE: ".local"
  IMAGE_PATH: "registry.gitlab.com/gpaw/gpaw-ci-containers"
  IMAGE_MAIN_OLDEST: "$IMAGE_PATH/main:oldest"
  IMAGE_MAIN_LATEST: "$IMAGE_PATH/main:latest"
  IMAGE_CUDA: "$IMAGE_PATH/cuda:11"
  OMP_NUM_THREADS: "1"
  # CI for branches inside the GPAW namespace will run on lyn/torden
  # because the GPAW project settings define the CI variable
  # DEFAULT_RUNNER_TAG: "linux".
  # Forks will instead get this definition which allows running
  # pipelines on shared runners.
  DEFAULT_RUNNER_TAG: "saas-linux-small-amd64"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/pip-cache"

  # OpenMPI binds processes to specific physical cores (cf. mpiexec
  # manpage) when there are <= 2 cores.  This will cause it to
  # oversubscribe the /same/ physical cores when running simultaneous
  # size==2 jobs.  We therefore tell GPAW to tell mpiexec not to do
  # this.  This problem was not observed on camd-runner2 because it
  # uses hyperthreading and so was equipped to redistribute the load.
  GPAW_MPI_OPTIONS: "--bind-to none"

default:
  before_script:
    - export PYTHONUSERBASE=`realpath $PYTHONUSERBASE`
    - mkdir -p `python -m site --user-site`
    - export PATH=$PYTHONUSERBASE/bin:$PATH
    - export PYTEST_ADDOPTS="--color=yes"
    - pip freeze
  interruptible: true
  tags:
    - $DEFAULT_RUNNER_TAG


stages:
  - build
  - precalculate
  - test
  - deploy


# Build configurations that are built and tested separately in parallel.
# Implemented as a YAML anchor for reusability.
.build_matrix: &build_matrix
  parallel:
    matrix:
      - LANG: ["c", "c++"]


.needs_corresponding_build: &needs_corresponding_build
  parallel:
    matrix:
      - LANG: ['$[[ matrix.LANG ]]']


.build:
  stage: build
  <<: *build_matrix
  before_script:
    - !reference [default, before_script]
    - pip install --user --no-deps git+https://gitlab.com/ase/ase.git
    - | # Set different siteconfig vars for C and C++
      if [[ "$LANG" == "c++" ]]; then
        compiler="mpic++"
        std="-std=c++17"
        cpp_specific="use_cpp = True"
      else
        compiler="mpicc"
        std="-std=c99"
        cpp_specific=""
      fi
    - |
      cat << EOF > siteconfig.py
      ${cpp_specific}
      mpi = True
      compiler = '${compiler}'
      libraries = []
      library_dirs = []
      include_dirs = []

      extra_compile_args = ['${std}',
                            '-fPIC',
                            '-O3',
                            '-g',
                            '-fopenmp',
                            '-Wall',
                            # '-Werror',
                            ]
      extra_link_args = ['-fopenmp']

      # TODO: PySys_SetArgv() etc deprecated in Python 3.11
      import sys
      if sys.version_info >= (3, 11):
          extra_compile_args += ['-Wno-deprecated-declarations']
      # end TODO

      libraries += ['blas']

      fftw = True
      libraries += ['fftw3']

      scalapack = True
      libraries += ['scalapack-openmpi']

      libraries += ['xc']
      EOF
  artifacts:
    when: always
    paths:
      - $PYTHONUSERBASE
      - gpaw.egg-info
      - _gpaw.*.so
      - "*.log"
    expire_in: 30 mins


.gpu-job:
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH =~ "/^gpu-.*/"


.lumi-job:
  tags:
    - lumi
  rules:
    - if: ($GITLAB_USER_LOGIN == "jensj" || $GITLAB_USER_LOGIN == "mikaelkuisma" || $GITLAB_USER_LOGIN == "trossi") && ($CI_PIPELINE_SOURCE == "push")
      allow_failure: true
  id_tokens:
    CI_JOB_JWT:
      aud: https://gitlab.com


.lumi-g-job:
  extends: .lumi-job
  variables:
    LUMI_PROJECT: "project_465000939"
    SCHEDULER_PARAMETERS: "-A $LUMI_PROJECT -N 1 --ntasks-per-node=1 --gpus-per-node=1 -t 00:10:00 -p small-g"
  before_script:
    - export EBU_USER_PREFIX=/projappl/$LUMI_PROJECT/EasyBuild
    - module load cray-python/3.11.7
    - module load LUMI/24.03
    - module load partition/G
    - module load cpeGNU/24.03
    - module load rocm/6.0.3
    - module load cray-fftw/3.3.10.7
    - module load CuPy/13.2.0-cpeGNU-24.03-rocm             # from EBU_USER_PREFIX
    - module load ELPA/2024.05.001-cpeGNU-24.03-rocm        # from EBU_USER_PREFIX
    - module load libxc/6.2.2-cpeGNU-24.03                  # from EBU_USER_PREFIX
    - export GPAW_SETUP_PATH=/projappl/$LUMI_PROJECT/gpaw-setups-24.1.0
    - export MPICH_GPU_SUPPORT_ENABLED=1
    - !reference [default, before_script]


build:
  image: $IMAGE_MAIN_OLDEST
  extends:
    - .build
  script:
    - cat siteconfig.py
    - pip install --user --log build.log --editable . -v
    - gpaw -P 1 info
  cache:
    key: cache-build-oldest
    paths:
     - $PIP_CACHE_DIR


build-latest:
  image: $IMAGE_MAIN_LATEST
  extends:
    - .build
  script:
    - >
      pip install --upgrade
      pytest pytest-cov coverage pytest-xdist pytest-test-groups
    - |
      cat << EOF >> siteconfig.py
      define_macros += [('NDEBUG', None)]
      undef_macros = []

      from pathlib import Path
      libvdwxc = True
      libraries += ['vdwxc']

      libvdwxc_dir = Path('/install/libvdwxc')
      libvdwxc_libdir = libvdwxc_dir / 'lib'
      library_dirs += [libvdwxc_libdir]
      extra_link_args += [f'-Wl,-rpath={libvdwxc_libdir}']
      include_dirs += [libvdwxc_dir / 'include']

      elpa = True
      elpa_dir = Path('/install/elpa')
      elpa_libdir = elpa_dir / 'lib'
      # Maybe we should do a glob to avoid version dependence:
      elpa_includedir = elpa_dir / 'include/elpa-2022.11.001'
      libraries += ['elpa']
      library_dirs += [f'{elpa_libdir}']
      extra_link_args += [f'-Wl,-rpath={elpa_libdir}']
      include_dirs += [f'{elpa_includedir}']

      EOF
    - cat siteconfig.py
    - pip install --user --upgrade numpy scipy
    - pip install --user --upgrade mpi4py
    - pip install --user --editable . -v
    - gpaw -P 1 info
  cache:
    key: cache-build-latest
    paths:
     - $PIP_CACHE_DIR


build-cuda:
  image: $IMAGE_CUDA
  extends:
    - .build
    - .gpu-job
  script:
    - |
      cat << EOF >> siteconfig.py
      gpu = True
      gpu_target = 'cuda'
      gpu_compiler = 'nvcc'
      gpu_compile_args = ['-O3',
                          '-g']
      libraries += ['cudart', 'cublas']

      # MAGMA
      magma = True
      libraries += ['magma']
      EOF
    - cat siteconfig.py
    - pip install -v --user --log build.log --editable .


build-hip-cuda:
  image: $IMAGE_CUDA
  when: manual
  extends:
    - .build
    - .gpu-job
  script:
    - |
      cat << EOF >> siteconfig.py
      gpu = True
      gpu_target = 'hip-cuda'
      gpu_compiler = 'hipcc'
      gpu_compile_args = ['-O3',
                          '-g',
                          '-v']
      libraries += ['cudart', 'hipblas']

      # Suppress warnings from hip-cuda headers
      extra_compile_args += ['-Wno-deprecated-declarations',
                             '-Wno-implicit-int',
                             ]
      undef_macros += ['GPAW_GPU_AWARE_MPI']

      # MAGMA
      magma = True
      libraries += ['magma']
      EOF
    - cat siteconfig.py
     # Set env variable for HIPCC because otherwise it fails to pass the -std
    # flag to underlying nvcc/cicc... and may default to c++14.
    - export HIPCC_COMPILE_FLAGS_APPEND="-std=c++17"
    - pip install -v --user --log build.log --editable .


build-minimal:
  image: $IMAGE_MAIN_OLDEST
  extends:
    - .build
  script:
    - |
      if [ "$LANG" == "c++" ]; then
        compiler="g++"
        cpp_specific="use_cpp = True"
      else
        compiler="gcc"
        cpp_specific=""
      fi
      cat << EOF > siteconfig.py
      ${cpp_specific}
      compiler = '${compiler}'
      mpi = False
      noblas = True
      nolibxc = True
      EOF
    - cat siteconfig.py
    - pip install --user --log build.log --editable . -v
    - gpaw info


build-lumi-g:
  extends:
    - .build
    - .lumi-g-job
  when: manual
  script:
    - module load buildtools-python/24.03-cray-python3.11
    - |
      cat << EOF > siteconfig.py
      mpi = True
      compiler = 'CC'
      compiler_args = []
      libraries = []
      library_dirs = []
      include_dirs = []
      extra_compile_args = [
          '-g',
          '-O3',
          '-fopenmp',
          '-fPIC',
          '-Wall',
          '-Wno-stringop-overflow',  # suppress warnings from MPI_STATUSES_IGNORE
          '-Wno-deprecated-declarations',  # PySys_SetArgv() etc deprecated in Python 3.11
          #'-Werror',
          ]
      extra_link_args = ['-fopenmp']

      fftw = True
      libraries += ['fftw3']

      scalapack = True

      libraries += ['xc']

      define_macros += [('GPAW_ASYNC', None)]

      gpu = True
      gpu_target = 'hip-amd'
      gpu_compiler = 'hipcc'
      gpu_include_dirs = []
      gpu_compile_args = [
          '-g',
          '-O3',
          '--offload-arch=gfx90a',
          ]
      libraries += ['amdhip64', 'hipblas']
      EOF
    - cat siteconfig.py
    - pip install --user --no-deps ase==3.23.0
    - pip install --user --no-deps -v --log build.log --editable .
    - gpaw info


prepare-libxc:
  image: $IMAGE_MAIN_OLDEST
  stage: build
  variables:
    PREFIX: $PYTHONUSERBASE
  before_script:
    - export PREFIX=`realpath $PREFIX`
  script:
    - git clone -b 7.0.0 https://gitlab.com/libxc/libxc.git
    - cd libxc
    - autoreconf -i
    - >
      ./configure --enable-shared --disable-static --disable-fortran --prefix=$PREFIX
      --disable-kxc
      --disable-lxc
      # Enable kxc, lxc, ... derivatives only if needed (affects compilation time)
    - make | tee ../libxc-build.log
    - make install
  when: manual
  artifacts:
    paths:
      - $PREFIX
      - "*.log"
    expire_in: 30 mins


build-libxc:
  image: $IMAGE_MAIN_OLDEST
  extends:
    - .build
  needs:
    - prepare-libxc
  script:
    - |
      cat << EOF >> siteconfig.py
      local = Path('.local').resolve()
      include_dirs += [local / 'include']
      library_dirs += [local / 'lib']
      runtime_library_dirs += [local / 'lib']
      EOF
    - cat siteconfig.py
    - pip install --user --log build.log --editable .
    - gpaw -P 1 info


gpwfiles:
  image: $IMAGE_MAIN_LATEST
  needs:
    # Do this only for the C build
    - job: build-latest
      parallel:
        matrix:
          - LANG: "c"
    - job: nightly-all
  stage: precalculate
  tags:
    - xeon40
  before_script:
    - !reference [default, before_script]
  script:
    - >
      pytest -n 16 -m generate_gpw_files --durations 30 -v
      --cov=gpaw
    - mv .coverage coverage-$CI_JOB_NAME
  artifacts:
    paths:
      - .pytest_cache/
      - coverage-$CI_JOB_NAME
    expire_in: 30 mins
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      when: on_success
      allow_failure: true
    - if: $CI_PIPELINE_SOURCE == "schedule"


.test:
  stage: test
  needs:
    - job: precalculate
  before_script:
    - !reference [default, before_script]


test-oldest:
  image: $IMAGE_MAIN_OLDEST
  extends:
    - .test
  needs:
    - job: build
  script:
    - gpaw info
    - >
      OMP_NUM_THREADS=2 pytest -v -We -k 0-fd gpaw/test/test_fuzz.py

    # This is the only test which uses OpenMP.
    # We may want to identify a limited set of tests that must work
    # with OpenMP, but so far we just have it in this job.


test-latest:
  image: $IMAGE_MAIN_LATEST
  extends:
    - .test
  <<: *build_matrix
  needs:
    - job: build-latest
      <<: *needs_corresponding_build
  script:
    - gpaw info
    - GPAW_DEBUG=1 pytest -v -m "ci or gpu" --cov=gpaw
    - coverage html
  artifacts:
    paths:
      - htmlcov/
    expire_in: 1 week
  coverage: '/TOTAL.+ ([0-9]+\.[0-9]+%)/'


test-latest-new:
  image: $IMAGE_MAIN_LATEST
  extends:
    - .test
  <<: *build_matrix
  needs:
    - job: build-latest
      <<: *needs_corresponding_build
  script:
    - gpaw info
    - GPAW_DEBUG=1 GPAW_NEW=1 pytest -v -m "ci and not old_gpaw_only"


test-minimal:
  image: $IMAGE_MAIN_OLDEST
  extends:
    - .test
  needs:
    - job: build-minimal
  script:
    - gpaw info
    - >
      pytest -v -m ci -We

test-cuda:
  image: $IMAGE_CUDA
  extends:
    - .test
    - .gpu-job
  needs:
    - job: build-cuda
  tags:
    - cuda
  script:
    - nvidia-smi
    - gpaw info
    - python -c 'import cupy; import cupyx; from cupy.cuda import runtime'
    - pytest -v -m gpu


test-cuda-mpi:
  image: $IMAGE_CUDA
  extends:
    - .test
    - .gpu-job
  <<: *build_matrix
  needs:
    - job: build-cuda
      <<: *needs_corresponding_build
  tags:
    - cuda-mpi
  script:
    - nvidia-smi
    - gpaw info
    - GPAW_DEBUG=1 gpaw -P 2 python -m pytest -v -x -m gpu
    - gpaw -P 4 python -m pytest -v -x -m gpu

test-hip-cuda:
  image: $IMAGE_CUDA
  extends:
    - .test
    - .gpu-job
  needs:
    - job: build-hip-cuda
  tags:
    - cuda
  script:
    - nvidia-smi
    - gpaw info
    - pytest -v -m gpu


test-lumi-g:
  extends:
    - .test
    - .lumi-g-job
  needs:
    - build-lumi-g
  script:
    - rocm-smi || true  # rocm-smi yields non-zero return code
    - gpaw info
    - pytest -v -m gpu


test-lumi-g-mpi:
  extends:
    - .test
    - .lumi-g-job
  needs:
    - build-lumi-g
  variables:
    SCHEDULER_PARAMETERS: "-A $LUMI_PROJECT -N 1 --ntasks-per-node=2 --gpus-per-node=2 -t 00:10:00 -p small-g"
  script:
    - rocm-smi || true  # rocm-smi yields non-zero return code
    - gpaw info
    - srun pytest -v -m gpu


test-libxc:
  image: $IMAGE_MAIN_OLDEST
  extends:
    - .test
  needs:
    - build-libxc
  script:
    - gpaw info
    - pytest -v -m libxc

check-agts:
  image: $IMAGE_MAIN_OLDEST
  stage: test
  needs:
    - build
  script:
    # - pip install --user git+https://gitlab.com/myqueue/myqueue.git@master
    - pip install --user myqueue
    - mq config --in-place
    - mq init
    - mq workflow -p agts.py -zT | tail -1 | tee task_count
    - >
      [[ `cut -d ' ' -f1 < task_count` -ge 501 ]] || (echo "Too few agts tasks"; exit 1)


lint:
  image: $IMAGE_MAIN_LATEST
  stage: build
  script:
    - echo "png check"
    - >
      [[ `find . -name '*.png' | wc -l` -le 5 ]] || (echo "Too many png files in git"; exit 1)
    - echo "compileall"
    - python --version
    - python -We:invalid -m compileall -f -q gpaw/
    - echo "flake8"
    - pip install flake8
    - flake8 --version
    - flake8 --doctests gpaw
    - >
      flake8
      --doctests
      --exclude "doc/platforms/*,doc/*/summerschool24/*/"
      --extend-ignore E402
      doc
    - >
      flake8
      --doctests
      --extend-ignore E402,E501
      doc/summerschools/summerschool24/catalysis
      doc/platforms/Linux/Niflheim


typecheck:
  image: $IMAGE_MAIN_LATEST
  stage: build
  script:
    - pip install mypy
    - python --version
    - mypy --version
    - mypy --pretty


docs:
  image: $IMAGE_MAIN_LATEST
  stage: test
  needs:
    - build-latest
  script:
    - pip install scikit-image
    - pip install -e git+https://gitlab.com/gpaw/gpaw-web-page-data.git#egg=gpaw-web-page-data
    - cd doc
    - make
    - make doctest
    - cd ..
# We would like to verify that the URLs are valid, but this has been failing.
# We could reenable this check and make sure it runs well (and is not
# too spammy on the URLs)
#     - python -c "from gpaw.utilities.urlcheck import test; test()"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      when: manual
      allow_failure: true
    - if: $CI_PIPELINE_SOURCE == "schedule"
  artifacts:
    paths:
      - doc/build/html
    expire_in: 1 week


nightly-all:
  image: $IMAGE_MAIN_LATEST
  stage: build
  script:
    - echo This is only a dummy job used to trigger other jobs
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      when: manual
      allow_failure: true
    - if: $CI_PIPELINE_SOURCE == "schedule"


.nightly:
  image: $IMAGE_MAIN_LATEST
  variables:
    GPAW_MPI_NPROCS: "1"
    GPAW_TESTGROUPS: "1"
    GPAW_MYTESTGROUP: "1"
  extends:
    - .test
  stage: test
  needs:
    - job: build-latest
    - gpwfiles
  tags:
    - xeon40
  before_script:
    - !reference [default, before_script]
    - pip install pytest-instafail pytest-xdist

    # Make script to parse jobname into specific job settings:
    - |
      cat << EOF > parse_jobname.py
      import os, sys
      print(os.environ['CI_JOB_NAME'].split('-')[int(sys.argv[1])])
      EOF

    # Now split "nightly-mpi-8-group-2-3" into into variables we need:
    - export GPAW_MPI_NPROCS=$(python parse_jobname.py 2)
    - export GPAW_MYTESTGROUP=$(python parse_jobname.py 4)
    - export GPAW_TESTGROUPS=$(python parse_jobname.py 5)

    # We need to use GPAW_PREEXEC_SCRIPT to hack the environment
    # so coverage writes to different files:
    - |
      cat << EOF > preexec.py
      import os
      from gpaw.mpi import world
      from pathlib import Path
      cwd = Path.cwd()
      os.environ['COVERAGE_FILE'] = str(cwd / f'gpaw-coverage-{world.rank}')
      EOF

    - export GPAW_PREEXEC_SCRIPT=$(realpath preexec.py)
  script:
    - >
      gpaw -P $GPAW_MPI_NPROCS python -m pytest
      --test-group-count $GPAW_TESTGROUPS --test-group=$GPAW_MYTESTGROUP
      --test-group-random-seed=42
      --cov=gpaw --instafail -r s --durations 30
  after_script:
    - coverage combine gpaw-coverage-*
    - mv .coverage coverage-$CI_JOB_NAME
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      when: on_success
      allow_failure: true
    - if: $CI_PIPELINE_SOURCE == "schedule"
  #  - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  artifacts:
    paths:
      - coverage-$CI_JOB_NAME
    expire_in: 1 day


nightly-mpi-1-group-1-1:
  extends:
    - .nightly
  script:
    - gpaw info
    - pytest --cache-show
    - pytest -n 8 --instafail -r s --durations 30 --cov=gpaw
    - coverage
  after_script:
    - mv .coverage coverage-$CI_JOB_NAME


nightly-mpi-2-group-1-3:
  extends:
    - .nightly


nightly-mpi-2-group-2-3:
  extends:
    - .nightly


nightly-mpi-2-group-3-3:
  extends:
    - .nightly


nightly-mpi-4-group-1-2:
  extends:
    - .nightly


nightly-mpi-4-group-2-2:
  extends:
    - .nightly


nightly-mpi-8-group-1-2:
  extends:
    - .nightly


nightly-mpi-8-group-2-2:
  extends:
    - .nightly


.nightly-mpi-new:
  variables:
    GPAW_NEW: "1"
  script:
    - >
      gpaw -P $GPAW_MPI_NPROCS python -m pytest
      --test-group-count $GPAW_TESTGROUPS --test-group=$GPAW_MYTESTGROUP
      --test-group-random-seed=42
      --cov=gpaw --instafail -r s --durations 30
      -m "not (old_gpaw_only_mpi or old_gpaw_only or dscf or gllb or do or legacy or lrtddft or hybrids or pipekmezey) or new_gpaw_ready"
  extends:
    - .nightly


nightly-mpi-1-group-1-1-new:
  extends:
    - .nightly-mpi-new
  script:
    - gpaw info
    - pytest --cache-show
    - >
      pytest -n 8 --instafail -r s --durations 30 -m
      "not (old_gpaw_only or dscf or gllb or do or legacy or lrtddft or hybrids or pipekmezey) or new_gpaw_ready"
      --cov=gpaw
  after_script:
    - mv .coverage coverage-$CI_JOB_NAME


nightly-mpi-2-group-1-3-new:
  extends:
    - .nightly-mpi-new


nightly-mpi-2-group-2-3-new:
  extends:
    - .nightly-mpi-new


nightly-mpi-2-group-3-3-new:
  extends:
    - .nightly-mpi-new


nightly-mpi-4-group-1-2-new:
  extends:
    - .nightly-mpi-new
  variables:
    GPAW_DEBUG: "1"


nightly-mpi-4-group-2-2-new:
  extends:
    - .nightly-mpi-new
  variables:
    GPAW_DEBUG: "1"


nightly-mpi-8-group-1-2-new:
  extends:
    - .nightly-mpi-new


nightly-mpi-8-group-2-2-new:
  extends:
    - .nightly-mpi-new


nightly-mpi4py-4-group-1-2:
  extends:
    - .nightly-mpi-new
  variables:
    GPAW_MPI_BACKEND: "mpi4py"
    GPAW_DEBUG: "1"


nightly-mpi4py-4-group-2-2:
  extends:
    - .nightly-mpi-new
  variables:
    GPAW_MPI_BACKEND: "mpi4py"
    GPAW_DEBUG: "1"


coverage-combine:
  image: $IMAGE_MAIN_LATEST  # (Any image present on the runner will do)
  needs:
    - gpwfiles
    - nightly-mpi-1-group-1-1
    - nightly-mpi-2-group-1-3
    - nightly-mpi-2-group-2-3
    - nightly-mpi-2-group-3-3
    - nightly-mpi-4-group-1-2
    - nightly-mpi-4-group-2-2
    - nightly-mpi-8-group-1-2
    - nightly-mpi-8-group-2-2
    - nightly-mpi-1-group-1-1-new
    - nightly-mpi-2-group-1-3-new
    - nightly-mpi-2-group-2-3-new
    - nightly-mpi-2-group-3-3-new
    - nightly-mpi-4-group-1-2-new
    - nightly-mpi-4-group-2-2-new
    - nightly-mpi-8-group-1-2-new
    - nightly-mpi-8-group-2-2-new
    - nightly-mpi4py-4-group-1-2
    - nightly-mpi4py-4-group-2-2
  tags:
    - xeon40
  script:
    - coverage combine coverage-gpwfiles coverage-nightly-*
    - coverage report
    - coverage html

    # We'd like to "just" use gitlab's coverage badge, but that won't work
    # unless this job runs in every pipeline.
    # We manually generate one then:
    - >
      python -m gpaw.doctools.makebadge
      $(coverage report --format=total --precision 0)
      > htmlcov/coverage.svg

  artifacts:
    paths:
      - htmlcov
    expire_in: 1 week


pages:
  image: $IMAGE_MAIN_LATEST  # (Any image present on the runner will do)
  stage: deploy
  dependencies:
    - coverage-combine
  tags:
    - xeon40
  script:
    - mv htmlcov public
  artifacts:
    paths:
      - public
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
